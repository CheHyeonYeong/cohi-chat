name: Client Deploy Production

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'docker-compose.prod.yml'
      - '.github/workflows/client-deploy-prod.yml'
  workflow_dispatch:

concurrency:
  group: client-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-northeast-2
  S3_BUCKET: cohi-chat-config
  S3_FRONTEND_DIST: s3://cohi-chat-config/frontend/dist
  CLOUDFRONT_DISTRIBUTION_ID: E2TSEBMG1RADEW
  PROD_DOMAIN: www.cohi-chat.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: Build frontend
        run: |
          cd frontend
          pnpm build
        env:
          VITE_API_URL: /api

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload frontend dist to S3
        run: |
          aws s3 sync frontend/dist ${{ env.S3_FRONTEND_DIST }} --delete
          # Keep bucket root in sync as well, so CloudFront works
          # whether OriginPath is empty or /frontend/dist.
          aws s3 sync frontend/dist s3://${{ env.S3_BUCKET }}
          # Prevent stale index.html in browser cache from referencing old hashed assets.
          aws s3 cp frontend/dist/index.html ${{ env.S3_FRONTEND_DIST }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"
          aws s3 cp frontend/dist/index.html s3://${{ env.S3_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront cache and wait
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query 'Invalidation.Id' --output text)
          aws cloudfront wait invalidation-completed \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --id "$INVALIDATION_ID"
      - name: Verify public domain serves latest frontend assets
        run: |
          EXPECTED_JS=$(grep -o 'assets/index-[^"]*\.js' frontend/dist/index.html | head -1)
          EXPECTED_CSS=$(grep -o 'assets/index-[^"]*\.css' frontend/dist/index.html | head -1)

          if [ -z "$EXPECTED_JS" ] || [ -z "$EXPECTED_CSS" ]; then
            echo "Failed to parse expected asset hashes from built index.html"
            exit 1
          fi

          echo "Expected JS: $EXPECTED_JS"
          echo "Expected CSS: $EXPECTED_CSS"

          for i in {1..12}; do
            BODY=$(curl -fsSL -H "Cache-Control: no-cache, no-store" "https://${{ env.PROD_DOMAIN }}" || true)
            if echo "$BODY" | grep -q "$EXPECTED_JS" && echo "$BODY" | grep -q "$EXPECTED_CSS"; then
              echo "Public domain is serving latest assets."
              exit 0
            fi

            echo "Attempt $i/12: latest assets not visible yet, retrying in 10s..."
            sleep 10
          done

          echo "Deployment verification failed: ${EXPECTED_JS}/${EXPECTED_CSS} not served from https://${{ env.PROD_DOMAIN }}"
          exit 1
