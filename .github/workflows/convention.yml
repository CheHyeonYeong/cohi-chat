name: Convention Check

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  branch-convention:
    name: Branch Naming Convention
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "브랜치명: $BRANCH"

          # main 브랜치는 예외
          if [[ "$BRANCH" == "main" ]]; then
            echo "main 브랜치 — 검사 생략"
            exit 0
          fi

          # 패턴: {이니셜}_{이슈번호} (이니셜: khs, chy, bc)
          if [[ "$BRANCH" =~ ^(khs|chy|bc)_[0-9]+$ ]]; then
            echo "✅ 브랜치명 컨벤션 통과: $BRANCH"
          else
            echo ""
            echo "============================================"
            echo "❌ 브랜치명 컨벤션 위반: $BRANCH"
            echo ""
            echo "올바른 형식: {이니셜}_{이슈번호}"
            echo "예시: khs_354, chy_82, bc_12"
            echo "허용 이니셜: khs, chy, bc"
            echo "============================================"
            exit 1
          fi

  pr-title-convention:
    name: PR Title Convention
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          echo "PR 타이틀: $TITLE"

          # 패턴: {type}: #{이슈번호} {설명}
          if [[ "$TITLE" =~ ^(feat|fix|refactor|test|docs|chore|style|perf|ci):\ #[0-9]+\ .+ ]]; then
            echo "✅ PR 타이틀 컨벤션 통과: $TITLE"
          else
            echo ""
            echo "============================================"
            echo "❌ PR 타이틀 컨벤션 위반: $TITLE"
            echo ""
            echo "올바른 형식: {type}: #{이슈번호} {설명}"
            echo "예시: feat: #354 CI/CD 파이프라인 추가"
            echo "허용 type: feat, fix, refactor, test, docs, chore, style, perf, ci"
            echo "============================================"
            exit 1
          fi
