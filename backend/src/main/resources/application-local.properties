# Local development profile
# PostgreSQL (docker-compose로 제공)
spring.datasource.url=jdbc:postgresql://localhost:5432/cohichat
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Redis (Docker로 실행)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

# 시크릿 파일 로드 (optional: 없어도 시작됨)
spring.config.import=optional:classpath:application-local-secret.properties

# OAuth2 redirect URIs (local)
oauth2.google.redirect-uri=http://localhost:3000/oauth/callback/google
oauth2.kakao.redirect-uri=http://localhost:3000/oauth/callback/kakao

# Google Calendar - AWS Secrets Manager (로컬에서 테스트용)
google.calendar.credentials-secret-name=cohi-chat/prod
