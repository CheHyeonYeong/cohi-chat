services:
  chat-nginx:
    image: nginx:1.27-alpine
    container_name: cohi-chat-nginx
    ports:
      - "80:80"
    volumes:
      - ./chat/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./chat/nginx/upstream.conf:/etc/nginx/conf.d/upstream.conf:ro
    networks:
      - chat-network
    depends_on:
      chat-server:
        condition: service_healthy
    restart: unless-stopped

  chat-server:
    build:
      context: ./chat
      dockerfile: Dockerfile
    container_name: cohi-chat-server
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://${SUPABASE_DB_USER}:${SUPABASE_DB_PASSWORD}@${SUPABASE_DB_HOST}:${SUPABASE_DB_PORT:-5432}/${SUPABASE_DB_NAME:-postgres}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - chat-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3001/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped

networks:
  chat-network:
    driver: bridge
