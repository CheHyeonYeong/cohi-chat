services:
  chat-nginx:
    image: nginx:1.27-alpine
    container_name: cohi-chat-nginx
    ports:
      - "80:80"
    volumes:
      - ./chat/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./chat/nginx/upstream.conf:/etc/nginx/conf.d/upstream.conf
    networks:
      - chat-network
    restart: unless-stopped

  chat-server-blue: &chat-server-common
    image: ${CHAT_SERVER_IMAGE:-cohi-chat-chat-server:local}
    container_name: cohi-chat-server-blue
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://${SUPABASE_DB_USER}:${SUPABASE_DB_PASSWORD}@${SUPABASE_DB_HOST}:${SUPABASE_DB_PORT:-5432}/${SUPABASE_DB_NAME:-postgres}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - chat-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3001/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    stop_grace_period: 30s
    restart: unless-stopped

  chat-server-green:
    <<: *chat-server-common
    container_name: cohi-chat-server-green
    restart: unless-stopped

networks:
  chat-network:
    driver: bridge
