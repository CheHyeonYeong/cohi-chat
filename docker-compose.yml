# Local development docker-compose
services:
  db:
    image: postgres:17-alpine
    container_name: cohi-chat-db
    environment:
      - POSTGRES_DB=cohichat
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - cohi-chat-network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:8.6
    container_name: cohi-chat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - cohi-chat-network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  cohi-chat-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
