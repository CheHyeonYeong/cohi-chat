# Fluent Bit 3.0.0 configuration for cohichat backend stdout logs

[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info

[INPUT]
    Name              forward
    Listen            0.0.0.0
    Port              24224

[FILTER]
    Name              modify
    Match             cohichat.backend
    Add               application cohichat
    Add               pipeline backend-log

[OUTPUT]
    Name              http
    Match             cohichat.backend
    Host              vector
    Port              8686
    URI               /
    Format            json_lines
    json_date_key     fluentbit_timestamp
    json_date_format  iso8601
