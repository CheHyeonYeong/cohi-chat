# Fluent Bit 3.0.0 configuration for cohichat backend logs

[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info

[INPUT]
    Name              tail
    Path              /var/log/cohichat/backend.log
    Tag               cohichat.backend
    Refresh_Interval  5
    Rotate_Wait       30
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On
    Read_from_Head    Off

[FILTER]
    Name              modify
    Match             cohichat.backend
    Add               application cohichat
    Add               pipeline backend-log

[OUTPUT]
    Name              http
    Match             cohichat.backend
    Host              vector
    Port              8686
    URI               /
    Format            json_lines
    json_date_key     fluentbit_timestamp
    json_date_format  iso8601
